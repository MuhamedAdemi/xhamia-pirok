{% load static %}
<!DOCTYPE html>
<html lang="sq">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hyr — Xhamia Pirok</title>
  <link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>
<body>
<div class="login-wrapper">
  <div class="login-card">
    <div class="login-logo">
      <div class="xhami-ikona">🕌</div>
      <h2>Xhamia Pirok</h2>
      <p>Sistem Menaxhimi Financiar</p>
    </div>

    {% if messages %}
      {% for msg in messages %}
        <div class="njoftim gabim">❌ {{ msg }}</div>
      {% endfor %}
    {% endif %}

    <form method="post" action="{% url 'login' %}">
      {% csrf_token %}
      <div class="forma-grup">
        <label>Emri i Përdoruesit</label>
        <input type="text" name="username" placeholder="Shkruaj emrin tënd..." autofocus>
      </div>
      <div class="forma-grup">
        <label>Fjalëkalimi</label>
        <input type="password" name="password" placeholder="Fjalëkalimi...">
      </div>
      <button type="submit" class="btn-kryesor" style="width:100%; justify-content:center; margin-top:8px; padding:13px;">
        Hyr në Sistem
      </button>
    </form>

    <p style="text-align:center; margin-top:20px; font-size:12px; color:var(--tekst-dytësor);">
      Xhamia e Fshatit Pirok — Sistem i Brendshëm
    </p>
  </div>
</div>
</body>
</html>
